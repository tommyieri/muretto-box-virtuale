<!DOCTYPE html>
<!--
  WEEKEND (ui-v6) — pagina del weekend di gara, guidata da OpenF1 (live, CORS aperto).
  Aggancio: gara interna (calendario_2026.json) -> meeting OpenF1 via DATA della gara
  (Race == g.data). Nessuna mappa a mano. Selettore sessioni (FP/SQ/Sprint/Quali/Gara),
  timing con settori e micro-settori colorati (verde=personal, viola=record sessione,
  giallo=più lento), e telemetria per giro (velocità/gas/freno/marcia/DRS).
  URL: weekend.html?gp=<gara>   (es. ?gp=Belgio)
  FONTE = VERITÀ: nessun numero inventato. Se un dato manca, non si mostra.
-->

<script type="module">
const OF1 = 'https://api.openf1.org/v1';
const el = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const cache = new Map();
async function api(path, tent=0){
  if (cache.has(path)) return cache.get(path);
  let r;
  try { r = await fetch(`${OF1}/${path}`); }
  catch(e){ if (tent<2){ await new Promise(x=>setTimeout(x,700)); return api(path,tent+1); } throw e; }
  if (r.status===429 || r.status>=500){                 // rate-limit / errore transitorio: riprova
    if (tent<2){ await new Promise(x=>setTimeout(x,900*(tent+1))); return api(path,tent+1); }
    throw new Error(`OpenF1 ${r.status}`);
  }
  if (!r.ok) throw new Error(`OpenF1 ${r.status}`);
  const j = await r.json();
  if (!Array.isArray(j)){                                 // OpenF1 restituisce sempre liste
    if (tent<2){ await new Promise(x=>setTimeout(x,900)); return api(path,tent+1); }
    throw new Error('risposta inattesa da OpenF1');
  }
  cache.set(path, j);
  return j;
}
const col = c => c ? (c.startsWith('#') ? c : '#'+c) : 'var(--dim)';
const fmtLap = s => { if (s==null) return '—'; const m=Math.floor(s/60), r=(s-m*60); return m>0 ? `${m}:${r.toFixed(3).padStart(6,'0')}` : r.toFixed(3); };
const fmtSec = s => s==null ? '—' : s.toFixed(3);

// etichette sessione: nome OpenF1 -> sigla breve + descrizione
function label(name){
  const n = (name||'').toLowerCase();
  if (n==='practice 1') return {k:'FP1', d:'Libere 1', ord:1};
  if (n==='practice 2') return {k:'FP2', d:'Libere 2', ord:2};
  if (n==='practice 3') return {k:'FP3', d:'Libere 3', ord:3};
  if (n.includes('sprint') && (n.includes('qual')||n.includes('shootout'))) return {k:'SQ', d:'Sprint quali', ord:4};
  if (n==='sprint') return {k:'SPR', d:'Sprint', ord:5};
  if (n.includes('qualifying')) return {k:'QUALI', d:'Qualifica', ord:6};
  if (n==='race') return {k:'GARA', d:'Gara', ord:7};
  return {k:(name||'?').slice(0,4).toUpperCase(), d:name||'', ord:9};
}
const isRace = s => /race|sprint$/i.test(s.session_name||'') && !/qual|shootout/i.test(s.session_name||'');

let calGara=null, sessioni=[], sessSel=null, drivers={}, vista='replay', datiSub='timing', demoSet=new Set();
const cacheLaps={}, driversBySession={};
async function lapsOf(sk){
  if (cacheLaps[sk]) return cacheLaps[sk];
  const laps = await api(`laps?session_key=${sk}`);
  const per = {}; for (const l of laps) if (l.lap_duration!=null && l.date_start){ (per[l.driver_number] ||= []).push(l); }
  cacheLaps[sk] = per; return per;
}
async function drvOf(sk){
  if (driversBySession[sk]) return driversBySession[sk];
  const dl = await api(`drivers?session_key=${sk}`);
  const m = Object.fromEntries(dl.map(d=>[d.driver_number, d]));
  driversBySession[sk] = m; return m;
}

async function boot(){
  const gp = new URLSearchParams(location.search).get('gp');
  let cal=null;
  try { cal = await (await fetch('data/calendario_2026.json')).json(); } catch(e){}
  calGara = cal?.gare.find(g => g.gara===gp || g.nome===gp) || null;
  if (!calGara){ corpoErr('Weekend non trovato. Torna alla stagione.'); return; }
  // il replay per-giro esiste solo per le gare pubblicate in demo (manifest)
  try { const mf = await (await fetch('data/manifest.json')).json(); demoSet = new Set(mf.map(r=>r.gara)); } catch(e){ demoSet = new Set(); }

  el('wTitolo').innerHTML = `Weekend <em>//</em> ${esc(calGara.nome)}`;

  // meeting OpenF1: la sessione "Race" del 2026 la cui data == data gara interna
  let meetingKey=null, tutteSess=[];
  try {
    tutteSess = await api(`sessions?year=2026`);
    const race = tutteSess.find(s => (s.session_name==='Race') && s.date_start && s.date_start.slice(0,10)===calGara.data);
    meetingKey = race?.meeting_key ?? null;
  } catch(e){ corpoErr('OpenF1 non raggiungibile in questo momento. Riprova tra poco.'); return; }
  if (!meetingKey){ corpoErr('Dati OpenF1 non ancora disponibili per questo weekend.'); return; }

  sessioni = tutteSess.filter(s => s.meeting_key===meetingKey)
    .map(s => ({...s, lab: label(s.session_name)}))
    .sort((a,b)=> a.lab.ord - b.lab.ord);

  const primo = sessioni.find(s=>s.date_start);
  const circuito = primo?.circuit_short_name || calGara.circuito || '';
  const d0 = sessioni[0]?.date_start, d1 = sessioni[sessioni.length-1]?.date_start;
  const gg = (a,b)=>{ const A=new Date(a), B=new Date(b);
    const f=x=>x.toLocaleDateString('it-IT',{day:'numeric',month:'long'});
    return A.toDateString()===B.toDateString()? f(A) : `${A.toLocaleDateString('it-IT',{day:'numeric'})}–${f(B)}`; };
  el('wSotto').innerHTML = `<span>${esc(circuito)}</span>`
    + (calGara.giri?`<span><b>${calGara.giri}</b> giri</span>`:'')
    + (d0&&d1?`<span>${gg(d0,d1)} 2026</span>`:'')
    + `<span>round <b>${calGara.round}</b> di 22</span>`;

  // il cuore del progetto è la gara (replay + simulatore pit): all'apertura mostra
  // la GARA sulla mappa pista. Se la gara non c'è ancora, l'ultima sessione con dati.
  const def = sessioni.find(s=>s.lab.k==='GARA') || sessioni[sessioni.length-1];
  disegnaTabs();
  seleziona(def);
}

function disegnaTabs(){
  el('sessTabs').innerHTML = sessioni.map((s,i)=>
    `<button class="sess-tab" data-i="${i}"><span class="k">${s.lab.k}</span><span class="d">${s.lab.d}</span></button>`).join('');
  el('sessTabs').querySelectorAll('.sess-tab').forEach(b=>
    b.addEventListener('click', ()=> seleziona(sessioni[+b.dataset.i])));
}

async function seleziona(s){
  stopAnim();
  sessSel = s;
  el('sessTabs').querySelectorAll('.sess-tab').forEach(b=>
    b.classList.toggle('on', sessioni[+b.dataset.i]===s));
  const replay = (isRace(s) && calGara.gara_demo && demoSet.has(calGara.gara_demo)) ? calGara.gara_demo : null;
  el('switch').hidden = false;
  el('switch').innerHTML =
    `<button data-v="replay" class="${vista==='replay'?'on':''}">Replay &amp; simulatore pit</button>`
   +`<button data-v="dati" class="${vista==='dati'?'on':''}">Tempi &amp; telemetria</button>`;
  el('switch').querySelectorAll('button').forEach(b=>
    b.addEventListener('click', ()=>{ stopAnim(); vista=b.dataset.v; seleziona(s); }));

  el('corpo').innerHTML = `<div class="wknd-msg"><span class="spin"></span>Carico ${s.lab.d}&hellip;</div>`;
  try {
    drivers = await drvOf(s.session_key);
    if (vista==='replay') await vistaReplay(s, replay);
    else await vistaDati(s);
  } catch(e){ corpoErr('Dati sessione non disponibili: '+e.message); }
}

// ================= REPLAY & SIMULATORE PIT (vista principale) =================
async function vistaReplay(s, replay){
  if (replay){   // la gara ha il replay per-giro + simulatore pit + mappa: incorporalo
    el('corpo').innerHTML = `<div class="wknd-embed">
      <iframe title="Replay & simulatore pit" src="gara.html?g=${encodeURIComponent(replay)}&embed=1" loading="lazy"></iframe></div>`;
    return;
  }
  // sessione senza replay per-giro (libere/quali/sprint): mappa dell'intera sessione
  const laps = await api(`laps?session_key=${s.session_key}`);
  const conGiro = laps.filter(l=>l.lap_duration!=null && l.date_start);
  if (!conGiro.length){ el('corpo').innerHTML = `<div class="wknd-msg">Mappa non disponibile: nessun giro tracciato in questa sessione.</div>`; return; }
  el('corpo').innerHTML = `<div class="sez-tit" style="margin-top:4px">Mappa della sessione &mdash; tutti i piloti</div><div id="mapBody"></div>`;
  await mapAll(s, conGiro);
}

// ================= TEMPI & TELEMETRIA (semplice, senza mappa) =================
async function vistaDati(s){
  el('corpo').innerHTML =
    `<div class="wknd-switch" style="margin-bottom:14px">
       <button data-d="timing" class="${datiSub==='timing'?'on':''}">Classifica &amp; settori</button>
       <button data-d="telem" class="${datiSub==='telem'?'on':''}">Confronto telemetria</button>
     </div><div id="datiBody"></div>`;
  el('corpo').querySelectorAll('.wknd-switch button').forEach(b=>
    b.addEventListener('click', ()=>{ datiSub=b.dataset.d; vistaDati(s); }));
  const box = el('datiBody');
  if (datiSub==='timing') await vistaTiming(s, box);
  else await vistaTelemCompare(s, box);
}

// ---------- classifica sessione + settori + micro-settori ----------
async function vistaTiming(s, box){
  const laps = await api(`laps?session_key=${s.session_key}`);
  // giro migliore per pilota (lap_duration valido)
  const best = {};
  for (const l of laps){
    if (l.lap_duration==null) continue;
    const b = best[l.driver_number];
    if (!b || l.lap_duration < b.lap_duration) best[l.driver_number] = l;
  }
  const righe = Object.values(best).sort((a,b)=>a.lap_duration-b.lap_duration);
  if (!righe.length){ box.innerHTML = `<div class="wknd-msg">Nessun tempo registrato in questa sessione.</div>`; return; }
  const top = righe[0].lap_duration;
  // record di settore (session best) e migliore personale per settore
  const sbest = [Infinity,Infinity,Infinity];
  for (const l of Object.values(best)) [1,2,3].forEach(i=>{
    const v=l['duration_sector_'+i]; if (v!=null && v<sbest[i-1]) sbest[i-1]=v; });

  // viola = record di settore della sessione; altrimenti neutro (il verde/giallo
  // sta nei micro-settori, dove il dato è per-segmento e non dedotto)
  const secCls = (v,i)=> (v!=null && v<=sbest[i-1]+1e-6) ? 'sb' : '';
  const trap = l => Math.max(l.i1_speed||0, l.i2_speed||0, l.st_speed||0) || null;

  const testa = `<div class="tm-row testa"><span class="pos">P</span><span></span><span>pilota</span>
    <span class="best">giro</span><span class="gap">gap</span>
    <span class="sec sc">S1</span><span class="sec sc">S2</span><span class="sec sc">S3</span><span class="trap">km/h</span></div>`;
  const body = righe.map((l,i)=>{
    const d = drivers[l.driver_number]||{};
    const c = col(d.team_colour);
    const gap = i===0? 'best' : '+'+(l.lap_duration-top).toFixed(3);
    const tr = trap(l);
    return `<div class="tm-row"><span class="cbar" style="background:${c}"></span>
      <span class="pos">${i+1}</span>
      <span class="rnum" style="color:${c}">${l.driver_number}</span>
      <span class="who"><b>${esc(d.name_acronym||l.driver_number)}</b><span>${esc(d.team_name||'')}</span></span>
      <span class="best">${fmtLap(l.lap_duration)}</span>
      <span class="gap">${gap}</span>
      <span class="sec ${secCls(l.duration_sector_1,1)}">${fmtSec(l.duration_sector_1)}</span>
      <span class="sec ${secCls(l.duration_sector_2,2)}">${fmtSec(l.duration_sector_2)}</span>
      <span class="sec ${secCls(l.duration_sector_3,3)}">${fmtSec(l.duration_sector_3)}</span>
      <span class="trap">${tr?tr:'—'}</span></div>`;
  }).join('');

  // micro-settori: strip del giro migliore di ognuno (primi 12 per leggibilità)
  const microRighe = righe.slice(0,12).map(l=>{
    const d = drivers[l.driver_number]||{};
    const cells = [1,2,3].map(si=>{
      const segs = l['segments_sector_'+si]||[];
      const inner = segs.map(v=>`<span class="seg ${cellClass(v)}"></span>`).join('');
      return inner + (si<3?'<span class="sep"></span>':'');
    }).join('');
    return `<div class="ms-row">
      <span class="who"><i style="background:${col(d.team_colour)}"></i>${esc(d.name_acronym||l.driver_number)}</span>
      <span class="ms-strip">${cells}</span>
      <span class="lt">${fmtLap(l.lap_duration)}</span></div>`;
  }).join('');

  const legenda = `<div class="ms-legend">
    <i><span class="sw ms-cell-viola"></span>record sessione</i>
    <i><span class="sw ms-cell-verde"></span>miglior personale</i>
    <i><span class="sw ms-cell-giallo"></span>più lento</i>
    <i><span class="sw ms-cell-box"></span>box / n.d.</i></div>`;

  box.innerHTML = `
    <section class="panel tm">${testa}${body}</section>
    <div class="sez-tit">Micro-settori &mdash; giro migliore</div>
    <section class="panel ms-wrap">${legenda}${microRighe}</section>`;
}
// codici segmento OpenF1 -> classe colore
function cellClass(v){
  if (v===2051) return 'ms-cell-viola';       // record sessione (viola)
  if (v===2049 || v===2050) return 'ms-cell-verde'; // miglior personale (verde)
  if (v===2048) return 'ms-cell-giallo';      // più lento (giallo)
  return 'ms-cell-box';                        // 2064 / 0 / null: box o non cronometrato
}

// ---------- confronto telemetria: giro A vs giro B (anche di altre sessioni) ----------
async function vistaTelemCompare(s, box){
  const optS = cur => sessioni.map(x=>`<option value="${x.session_key}" ${x.session_key===cur?'selected':''}>${esc(x.lab.d)}</option>`).join('');
  box.innerHTML = `
    <div class="cmp-ctl">
      <div class="cmp-row a"><span class="side">A</span>
        <select id="aSess">${optS(s.session_key)}</select><select id="aDrv"></select><select id="aLap"></select></div>
      <div class="cmp-row b"><span class="side">B</span>
        <select id="bSess">${optS(s.session_key)}</select><select id="bDrv"></select><select id="bLap"></select>
        <label class="btoggle"><input type="checkbox" id="bOn" checked> confronta</label></div>
    </div>
    <div id="cmpOut"><div class="wknd-msg"><span class="spin"></span>Preparo i giri&hellip;</div></div>`;

  const fillDrv = async side => {
    const sk=+el(side+'Sess').value, per=await lapsOf(sk), dm=await drvOf(sk);
    const nums=Object.keys(per).map(Number).sort((a,b)=> Math.min(...per[a].map(x=>x.lap_duration)) - Math.min(...per[b].map(x=>x.lap_duration)));
    el(side+'Drv').innerHTML = nums.map(n=>`<option value="${n}">${esc(dm[n]?.name_acronym||n)} — ${esc(dm[n]?.team_name||'')}</option>`).join('');
  };
  const fillLap = async side => {
    const sk=+el(side+'Sess').value, n=+el(side+'Drv').value, per=await lapsOf(sk);
    const ls=(per[n]||[]).slice().sort((a,b)=>a.lap_number-b.lap_number);
    if (!ls.length){ el(side+'Lap').innerHTML=''; return; }
    const fast=ls.reduce((m,x)=>x.lap_duration<m.lap_duration?x:m, ls[0]);
    el(side+'Lap').innerHTML = ls.map(l=>`<option value="${l.lap_number}" ${l===fast?'selected':''}>Giro ${l.lap_number} — ${fmtLap(l.lap_duration)}${l===fast?' ⚡':''}</option>`).join('');
  };
  el('aSess').addEventListener('change', async()=>{ await fillDrv('a'); await fillLap('a'); render(); });
  el('aDrv').addEventListener('change', async()=>{ await fillLap('a'); render(); });
  el('aLap').addEventListener('change', render);
  el('bSess').addEventListener('change', async()=>{ await fillDrv('b'); await fillLap('b'); render(); });
  el('bDrv').addEventListener('change', async()=>{ await fillLap('b'); render(); });
  el('bLap').addEventListener('change', render);
  el('bOn').addEventListener('change', render);

  await fillDrv('a'); await fillLap('a');
  await fillDrv('b'); if (el('bDrv').options.length>1) el('bDrv').selectedIndex=1; await fillLap('b');
  render();

  async function loadLap(sk,n,lapN){
    const per=await lapsOf(sk); const l=(per[n]||[]).find(x=>x.lap_number===lapN); if(!l) return null;
    const t0=new Date(l.date_start).getTime(), tEnd=t0+l.lap_duration*1000;
    let cd=await api(`car_data?session_key=${sk}&driver_number=${n}&date>=${new Date(t0-200).toISOString()}&date<=${new Date(tEnd+400).toISOString()}`);
    cd=cd.filter(x=>x.speed!=null).map(x=>({...x, _t:new Date(x.date).getTime()}))
        .filter(x=>x._t>=t0 && x._t<=tEnd).sort((a,b)=>a._t-b._t);
    const dm=await drvOf(sk);
    return {l, cd, d:dm[n]||{}, t0, dur:l.lap_duration*1000, n, sk};
  }

  async function render(){
    const out=el('cmpOut'); out.innerHTML=`<div class="wknd-msg"><span class="spin"></span>Carico i giri&hellip;</div>`;
    let A,B;
    try {
      A=await loadLap(+el('aSess').value, +el('aDrv').value, +el('aLap').value);
      B=el('bOn').checked ? await loadLap(+el('bSess').value, +el('bDrv').value, +el('bLap').value) : null;
    } catch(e){ out.innerHTML=`<div class="wknd-msg err">Telemetria non disponibile: ${e.message}</div>`; return; }
    if (!A || A.cd.length<5){ out.innerHTML=`<div class="wknd-msg">Telemetria non disponibile per il giro A.</div>`; return; }
    if (B && B.cd.length<5) B=null;
    out.innerHTML = renderCompare(A,B);
  }
}

function renderCompare(A,B){
  const W=1000;
  const sessLab = sk => (sessioni.find(x=>x.session_key===sk)?.lab.d)||'';
  const line = (g,key,max,h) => g.cd.map((p,i)=>{
    const x=Math.max(0,Math.min(1,(p._t-g.t0)/g.dur))*W, y=h-((p[key]||0)/max)*h;
    return (i?'L':'M')+x.toFixed(1)+' '+y.toFixed(1); }).join(' ');
  const chip = (g,cls) => `<span class="cmp-lap"><i style="background:${col(g.d.team_colour)}"></i>
    <b style="color:${cls}">${esc(g.d.name_acronym||g.n)}</b> · ${esc(sessLab(g.sk))} · giro ${g.l.lap_number} · <b>${fmtLap(g.l.lap_duration)}</b></span>`;
  const CA='var(--accent)', CB='var(--brand)';
  const vmax = Math.max(...A.cd.map(p=>p.speed), ...(B?B.cd.map(p=>p.speed):[0]), 1);

  // riepilogo + delta giro
  let sum = chip(A,CA);
  if (B){ const dl=A.l.lap_duration-B.l.lap_duration;
    sum += chip(B,CB) + `<span class="cmp-delta" style="color:${dl<0?CA:CB}">${dl>0?'+':''}${dl.toFixed(3)}s</span>`; }

  // delta per settore (A vs B)
  let secs='';
  if (B){ secs = `<div class="cmp-secs">` + [1,2,3].map(i=>{
    const a=A.l['duration_sector_'+i], b=B.l['duration_sector_'+i];
    const dl = (a!=null&&b!=null)? a-b : null;
    return `<div class="cmp-sec"><div class="k">Settore ${i}</div>
      <div class="v">${fmtSec(a)} <span style="color:var(--dim)">/ ${fmtSec(b)}</span></div>
      <div class="dl" style="color:${dl==null?'var(--dim)':dl<0?CA:CB}">${dl==null?'—':(dl>0?'+':'')+dl.toFixed(3)}</div></div>`;
  }).join('') + `</div>`; }

  // grafici sovrapposti (asse X = % del giro; A pieno, B tratteggiato)
  const graf = (titolo, key, max, h, unit) => `
    <div class="tel-blk"><div class="lab"><span>${titolo}</span><b>${unit}</b></div>
      <svg viewBox="0 0 ${W} ${h}" preserveAspectRatio="none">
        <line class="axis" x1="0" y1="${h-1}" x2="${W}" y2="${h-1}"/>
        <path fill="none" stroke="${CA}" stroke-width="2" vector-effect="non-scaling-stroke" d="${line(A,key,max,h-4)}"/>
        ${B?`<path fill="none" stroke="${CB}" stroke-width="2" stroke-dasharray="7 6" vector-effect="non-scaling-stroke" d="${line(B,key,max,h-4)}"/>`:''}
      </svg></div>`;

  // micro-settori dei giri scelti
  const strip = g => [1,2,3].map(si=>{
    const segs=g.l['segments_sector_'+si]||[];
    return segs.map(v=>`<span class="seg ${cellClass(v)}"></span>`).join('') + (si<3?'<span class="sep"></span>':'');
  }).join('');
  const micro = `<div class="sez-tit">Micro-settori</div><section class="panel ms-wrap">
    <div class="ms-legend"><i><span class="sw ms-cell-viola"></span>record</i><i><span class="sw ms-cell-verde"></span>personale</i><i><span class="sw ms-cell-giallo"></span>più lento</i><i><span class="sw ms-cell-box"></span>box</i></div>
    <div class="ms-row"><span class="who"><i style="background:${CA}"></i>${esc(A.d.name_acronym||A.n)}</span><span class="ms-strip">${strip(A)}</span><span class="lt">${fmtLap(A.l.lap_duration)}</span></div>
    ${B?`<div class="ms-row"><span class="who"><i style="background:${CB}"></i>${esc(B.d.name_acronym||B.n)}</span><span class="ms-strip">${strip(B)}</span><span class="lt">${fmtLap(B.l.lap_duration)}</span></div>`:''}
  </section>`;

  return `<div class="cmp-sum">${sum}</div>${secs}
    <section class="panel tel-graf">
      ${graf('Velocità','speed',vmax,160,'max '+vmax+' km/h')}
      ${graf('Acceleratore','throttle',100,70,'%')}
      ${graf('Freno','brake',100,54,'%')}
      <div class="lab" style="color:var(--dim);margin:2px 8px 0"><span>asse orizzontale = percentuale del giro</span><span>${B?'A pieno · B tratteggiato':''}</span></div>
    </section>${micro}`;
}

// ---------- mappa pista: giro singolo (trail micro-settori) o tutti i piloti ----------
let animId=null;
function stopAnim(){ if (animId){ cancelAnimationFrame(animId); animId=null; } }
const clsMs = v => v===2051?'viola':(v===2049||v===2050)?'verde':v===2048?'giallo':'box';
const linea = ps => ps.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');

// trasforma coordinate OpenF1 grezze in viewBox (y invertita, pista centrata)
function normalizza(loc){
  const xs=loc.map(p=>p.x), ys=loc.map(p=>p.y);
  const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const spanX=maxX-minX, spanY=maxY-minY, W=1000, pad=46;
  const sc = (W-2*pad)/Math.max(spanX, spanY, 1);
  const H = Math.round(Math.max(spanY,1)*sc + 2*pad);
  const offX = (W - spanX*sc)/2, offY = (H - spanY*sc)/2;
  const tf = (x,y) => ({ x: offX+(x-minX)*sc, y: H-(offY+(y-minY)*sc) });
  return { tf, W, H };
}

// ---- modalità TUTTI I PILOTI: pallini in movimento su una finestra temporale ----
let winShift = 0;   // scostamento della finestra (in unità di durata finestra)
const WIN_MS = 90000;
async function mapAll(s, conGiro){
  const body = el('mapBody');
  body.innerHTML = `<div class="wknd-msg"><span class="spin"></span>Carico la mappa di tutti i piloti&hellip;</div>`;
  // finestra di default: termina al giro più veloce della sessione (traffico + giro record)
  const pole = conGiro.reduce((m,x)=> x.lap_duration<m.lap_duration?x:m, conGiro[0]);
  const tRef = new Date(pole.date_start).getTime() + pole.lap_duration*1000;
  const winEnd = tRef + winShift*WIN_MS;
  const winStart = winEnd - WIN_MS;
  const from = new Date(winStart).toISOString(), to = new Date(winEnd+2000).toISOString();

  // contorno pista: dal giro record (traccia pulita)
  let outline, loc;
  try {
    [outline, loc] = await Promise.all([
      api(`location?session_key=${sessSel.session_key}&driver_number=${pole.driver_number}&date>=${new Date(new Date(pole.date_start).getTime()-400).toISOString()}&date<=${new Date(tRef+400).toISOString()}`),
      api(`location?session_key=${sessSel.session_key}&date>=${from}&date<=${to}`)
    ]);
  } catch(e){ body.innerHTML = `<div class="wknd-msg err">Dati posizione non disponibili: ${e.message}</div>`; return; }
  outline = outline.filter(p=>p.x!=null && (p.x||p.y));
  loc = loc.filter(p=>p.x!=null && (p.x||p.y));
  if (outline.length<20 || loc.length<20){ body.innerHTML = `<div class="wknd-msg">Traccia non disponibile per questa finestra.</div>`; return; }

  const {tf,W,H} = normalizza(outline);
  const base = outline.map(p=>tf(p.x,p.y));
  // serie temporale per pilota
  const perDrv = {};
  for (const p of loc){ (perDrv[p.driver_number] ||= []).push({ t:new Date(p.date).getTime(), x:p.x, y:p.y }); }
  const nums = Object.keys(perDrv).map(Number);
  nums.forEach(n=> perDrv[n].sort((a,b)=>a.t-b.t));

  const fmtClock = t => new Date(t).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  body.innerHTML = `
    <div class="map-ctl">
      <button class="sess-tab" id="winPrev" style="min-width:auto;padding:8px 12px"><span class="k" style="font-size:13px">&larr; 90s</span></button>
      <span class="tel-chip">finestra <b>${fmtClock(winStart)}</b>–<b>${fmtClock(winEnd)}</b></span>
      <button class="sess-tab" id="winNext" style="min-width:auto;padding:8px 12px"><span class="k" style="font-size:13px">90s &rarr;</span></button>
      <span class="tel-chip" style="border:none;color:var(--dim)">${nums.length} piloti in pista</span>
    </div>
    <section class="panel map-stage" id="mapStage">
      <svg viewBox="0 0 ${W} ${H}" aria-label="Mappa con tutti i piloti">
        <path class="map-base" d="${linea(base)} Z"/>
        <g id="mapDots"></g>
      </svg>
      <div class="map-hud"><div class="g" id="mapClock">${fmtClock(winStart)}</div></div>
      <div class="map-transport" style="position:relative">
        <button id="mapPlay" class="play" title="Play / Pausa">&#9654;</button>
        <input id="mapScrub" class="map-scrub" type="range" min="0" max="1000" value="0">
        <span class="map-time" id="mapTime">0.0s</span>
        <span class="tel-chip" style="border:none;color:var(--dim)">finestra 90s</span>
      </div>
    </section>`;
  el('winPrev').addEventListener('click', ()=>{ stopAnim(); winShift-=1; mapAll(s, conGiro); });
  el('winNext').addEventListener('click', ()=>{ stopAnim(); winShift+=1; mapAll(s, conGiro); });

  // crea un pallino + etichetta per pilota
  const g = el('mapDots'); const nodi={};
  for (const n of nums){ const d=drivers[n]||{};
    const c = col(d.team_colour);
    g.insertAdjacentHTML('beforeend',
      `<g id="mg${n}"><circle r="9" fill="${c}" stroke="#05070b" stroke-width="1.5"/>`
     +`<text font-size="15" font-weight="800" fill="#fff" stroke="#05070b" stroke-width="3" paint-order="stroke" dx="12" dy="5">${esc(d.name_acronym||n)}</text></g>`);
    const node = g.lastElementChild;
    nodi[n] = { g:node, c:node.querySelector('circle'), t:node.querySelector('text') };
  }
  // posizione del pilota n al tempo t (interpolata; nascosto se buco > 2.5s)
  const posAt = (arr, t) => {
    if (t<=arr[0].t) return arr[0].t-t>2500?null:arr[0];
    if (t>=arr[arr.length-1].t) return t-arr[arr.length-1].t>2500?null:arr[arr.length-1];
    let lo=0,hi=arr.length-1; while (lo<hi){ const m=(lo+hi)>>1; if (arr[m].t<t) lo=m+1; else hi=m; }
    const b=arr[lo], a=arr[lo-1]; if (b.t-a.t>2500) return null;
    const f=(t-a.t)/(b.t-a.t); return { x:a.x+(b.x-a.x)*f, y:a.y+(b.y-a.y)*f };
  };
  const clock=el('mapClock'), tlab=el('mapTime'), scrub=el('mapScrub'), play=el('mapPlay');
  const poni = t => {
    for (const n of nums){ const p=posAt(perDrv[n], t); const nd=nodi[n];
      if (!p){ nd.g.style.display='none'; continue; }
      nd.g.style.display=''; const q=tf(p.x,p.y);
      nd.c.setAttribute('cx',q.x.toFixed(1)); nd.c.setAttribute('cy',q.y.toFixed(1));
      nd.t.setAttribute('x',q.x.toFixed(1)); nd.t.setAttribute('y',q.y.toFixed(1)); }
    clock.textContent = fmtClock(t);
    tlab.textContent = ((t-winStart)/1000).toFixed(1)+'s';
    scrub.value = Math.round((t-winStart)/WIN_MS*1000);
  };
  poni(winStart);
  let playing=false, rafT0=0, baseElapsed=0;
  const tick = ts => { if (!rafT0) rafT0=ts; const elapsed = baseElapsed + (ts-rafT0);
    if (elapsed>=WIN_MS){ poni(winEnd); playing=false; play.classList.remove('playing'); play.innerHTML='&#9654;'; animId=null; return; }
    poni(winStart+elapsed); animId=requestAnimationFrame(tick); };
  const avvia = () => { playing=true; play.classList.add('playing'); play.innerHTML='&#10073;&#10073;';
    rafT0=0; baseElapsed = (+scrub.value/1000)*WIN_MS; animId=requestAnimationFrame(tick); };
  play.addEventListener('click', ()=>{ if (playing){ stopAnim(); playing=false; play.classList.remove('playing'); play.innerHTML='&#9654;'; } else avvia(); });
  scrub.addEventListener('input', ()=>{ stopAnim(); playing=false; play.classList.remove('playing'); play.innerHTML='&#9654;'; poni(winStart + (+scrub.value/1000)*WIN_MS); });
}

function corpoErr(msg){ stopAnim(); el('corpo').innerHTML = `<div class="wknd-msg err">${esc(msg)}</div>`; el('switch').hidden = true; }

boot();
</script>
