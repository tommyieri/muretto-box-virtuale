<!DOCTYPE html>
<!--
  HOME (ui-v2): la stagione 2026. Hero = prossima gara (countdown), sotto la griglia dei GP.
  Consumatore puro: legge demo/data/calendario_2026.json (generato da gen_calendario.py,
  fonte f1db) e demo/data/manifest.json. La pagina-gara e' gara.html?g=<nome>.
-->
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Muretto Box Virtuale — stagione 2026</title>
<link rel="stylesheet" href="stile.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%277%27 fill=%27%230a0c10%27/%3E%3Cpath d=%27M7 23V9h3.4L16 17l5.6-8H25v14h-3.5v-8.2L16.9 21h-1.8l-4.6-6.2V23z%27 fill=%27%234da3ff%27/%3E%3C/svg%3E">
</head>
<body>
<div class="topbar">
  <span class="brand">Muretto Box Virtuale <small>demo storica &middot; stagione 2026</small></span>
  <span style="margin-left:auto; display:flex; gap:14px">
    <a class="back" href="live.html">Live</a>
    <a class="back" href="classifiche.html">Classifiche</a>
    <a class="back" href="analisi.html">Analisi</a>
  </span>
</div>

<div class="wrap-home">
  <section class="hero" id="hero" hidden>
    <div class="eyebrow" id="heroEyebrow">Prossima gara</div>
    <h2 id="heroTitolo">…</h2>
    <div class="circuito" id="heroCircuito"></div>
    <div class="quando">
      <span class="data" id="heroData"></span>
      <span class="count" id="heroCount"></span>
    </div>
  </section>

  <div class="sez-tit">Stagione 2026</div>
  <div class="stagione" id="stagione"></div>

  <div class="footnote">
    Gare corse in demo: replay per-giro + esplorazione pit (&ldquo;se pitto al giro L, dove rientro?&rdquo;).
    Calendario da f1db (generatore <span class="num">gen_calendario.py</span>); vincitori dai dati gara pubblicati.
  </div>
</div>

<script type="module">
const el = id => document.getElementById(id);
const MESE = d => d.toLocaleDateString('it-IT', { day:'numeric', month:'long' });
let teamCol = {};

function cardGara(g, inDemo, corsa){
  const quando = MESE(new Date(g.data+'T12:00:00'));
  const testa = `<div class="r">R${String(g.round).padStart(2,'0')}</div>
    <div class="nome">${g.nome}</div><div class="data">${quando}${g.giri?` · ${g.giri} giri`:''}</div>`;
  if (inDemo){
    const w = g.vincitore;
    const win = w ? `<div class="win"><span class="tdot" style="background:${teamCol[w.team]||'var(--dim)'}"></span><b>${w.sigla}</b><span class="lab">vincitore</span></div>` : '';
    return `<a class="gpcard" href="gara.html?g=${encodeURIComponent(g.gara_demo)}">${testa}${win}</a>`;
  }
  if (corsa)   // corsa ma non (ancora) pubblicata in demo
    return `<div class="gpcard arrivo">${testa}<div class="win"><span class="lab">dati in arrivo</span></div></div>`;
  return `<div class="gpcard futura">${testa}<div class="stato">in calendario</div></div>`;
}

function countdown(dataISO){
  const target = new Date(dataISO+'T12:00:00');
  const oggi = new Date();
  const gg = Math.ceil((target - oggi) / 86400000);
  if (gg <= 0) return 'oggi';
  if (gg === 1) return 'domani';
  return `fra ${gg} giorni`;
}

async function boot(){
  const cal = await (await fetch('data/calendario_2026.json')).json();
  const manifest = await (await fetch('data/manifest.json')).json();
  try { teamCol = await (await fetch('team_colori.json')).json(); } catch(e){ teamCol={}; }
  const inDemo = new Set(manifest.map(r=>r.gara));
  const oggi = new Date(); oggi.setHours(0,0,0,0);

  // hero: la prossima gara in calendario (data >= oggi); a stagione finita, l'ultima corsa
  const prossima = cal.gare.find(g => new Date(g.data+'T23:59:59') >= oggi);
  const h = prossima || cal.gare[cal.gare.length-1];
  if (h){
    el('heroEyebrow').textContent = prossima ? 'Prossima gara' : 'Stagione conclusa';
    el('heroTitolo').textContent = `${h.titolo} — ${MESE(new Date(h.data+'T12:00:00'))}`;
    el('heroCircuito').textContent = `${h.circuito}${h.giri?` · ${h.giri} giri`:''} · round ${h.round} di ${cal.gare.length}`;
    el('heroData').textContent = new Date(h.data+'T12:00:00').toLocaleDateString('it-IT',{weekday:'long', day:'numeric', month:'long', year:'numeric'});
    el('heroCount').textContent = prossima ? countdown(h.data) : '';
    el('hero').hidden = false;
  }

  el('stagione').innerHTML = cal.gare.map(g => {
    const demoOk = !!g.gara_demo && inDemo.has(g.gara_demo);
    const corsa = new Date(g.data+'T23:59:59') < oggi;
    return cardGara(g, demoOk, corsa);
  }).join('');
}
boot();
</script>
</body>
</html>
